<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congresso Trabalho Internacional · Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --bg:#0c0616; --surface:#170d28; --border:#2c1d44;
      --purple:#7c3aed; --purple-l:#a855f7; --purple-d:#4c1d95;
      --gold:#d9b45a; --gold-l:#f2d98a; --gold-d:#a98430;
      --text:#f4eefb; --muted:#b0a0c8; --red:#f0788a; --green:#7fe0a8;
    }
    html{ font-size:130%; }
    *{ box-sizing:border-box; }
    body{ margin:0; color:var(--text); min-height:100vh; font-family:'Georgia','Times New Roman',serif; -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(1200px 620px at 8% -10%, rgba(124,58,237,.30), transparent 60%),
        radial-gradient(1000px 560px at 100% 0%, rgba(217,180,90,.12), transparent 55%),
        radial-gradient(900px 560px at 50% 118%, rgba(124,58,237,.14), transparent 60%),
        #0c0616; }
    .num, table, .gauge-leg, .k, .v, .card, input, button, .tab, .preset { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; }
    .page{ max-width:1560px; margin:0 auto; padding:22px 20px 40px; }
    .top{ display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:22px; }
    .brand{ display:flex; flex-direction:column; gap:2px; }
    .brand .kicker{ font-family:-apple-system,sans-serif; font-size:.7rem; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); }
    .brand h1{ margin:0; font-size:1.5rem; font-weight:700; letter-spacing:.01em; color:#fff; line-height:1.1; }
    .brand h1 b{ color:var(--gold-l); font-weight:700; }
    .brand .sub{ font-family:-apple-system,sans-serif; font-size:.72rem; color:var(--muted); margin-top:3px; letter-spacing:.02em; }
    .top-r{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .live{ display:inline-flex; align-items:center; gap:6px; font-family:-apple-system,sans-serif; font-size:.66rem; font-weight:800; letter-spacing:.14em; color:#120a04; background:linear-gradient(120deg,var(--gold),var(--gold-l)); padding:5px 11px; border-radius:20px; }
    .live::before{ content:''; width:7px; height:7px; border-radius:50%; background:#120a04; animation:pulse 1.6s infinite; }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }
    .presets,.dates{ display:inline-flex; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .dates{ gap:6px; padding:4px 9px; }
    .preset{ padding:8px 13px; font-size:.78rem; cursor:pointer; color:var(--muted); border:none; background:none; }
    .preset.active{ background:linear-gradient(120deg,var(--purple-d),var(--purple)); color:#fff; }
    .dlbl{ font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .dates input[type=date]{ background:transparent; border:1px solid var(--border); border-radius:6px; color:#fff; font-size:.76rem; padding:4px 6px; color-scheme:dark; cursor:pointer; }
    .dclear{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:.9rem; }
    .btn{ padding:9px 15px; border-radius:10px; border:1px solid var(--gold-d); background:rgba(217,180,90,.1); color:var(--gold-l); font-size:.8rem; font-weight:600; cursor:pointer; }
    .btn:hover{ background:rgba(217,180,90,.2); }
    .updated{ font-size:.68rem; color:var(--muted); }
    .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:2px; }
    .tab{ padding:10px 18px; font-size:.86rem; font-weight:600; cursor:pointer; color:var(--muted); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab:hover{ color:var(--text); }
    .tab.active{ color:var(--gold-l); border-bottom-color:var(--gold); }

    .gauges{ display:grid; grid-template-columns:repeat(auto-fit,minmax(19rem,1fr)); gap:16px; margin-bottom:20px; }
    .gauge-card{ background:linear-gradient(165deg,rgba(70,35,110,.4),rgba(30,16,52,.6)); border:1px solid rgba(217,180,90,.22); border-radius:18px; padding:22px 20px 18px; text-align:center; box-shadow:0 10px 40px rgba(60,20,110,.28); }
    .gauge-title{ font-size:.78rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); }
    .gauge-sub{ font-size:.66rem; color:var(--muted); margin-top:3px; }
    .gauge-wrap{ position:relative; margin:6px auto 4px; max-width:15rem; }
    .gauge-svg{ width:100%; display:block; overflow:visible; }
    .gauge-track{ fill:none; stroke:rgba(255,255,255,.08); stroke-width:12; stroke-linecap:round; }
    .gauge-fill{ fill:none; stroke-width:12; stroke-linecap:round; transition:stroke-dashoffset .6s; }
    .gauge-pct{ position:absolute; top:50%; left:0; right:0; transform:translateY(-52%); font-family:-apple-system,sans-serif; font-size:2.3rem; font-weight:800; color:#fff; }
    .gauge-leg{ font-family:-apple-system,sans-serif; font-size:9px; font-weight:600; }
    .gauge-stats{ display:flex; justify-content:center; gap:26px; margin-top:8px; }
    .gauge-stat-l{ font-size:.6rem; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
    .gauge-stat-v{ font-family:-apple-system,sans-serif; font-size:1.15rem; font-weight:800; color:#fff; }
    .gauge-stat-v.pc-ok{ color:var(--green); } .gauge-stat-v.pc-bad{ color:var(--red); }

    .lbl{ font-size:.72rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:22px 0 12px; display:flex; align-items:center; gap:10px; }
    .lbl::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(217,180,90,.35),transparent); }
    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(178px,1fr)); gap:13px; }
    .card{ background:linear-gradient(165deg,rgba(60,32,96,.38),rgba(26,14,46,.5)); border:1px solid var(--border); border-radius:14px; padding:15px 16px; display:flex; flex-direction:column; gap:3px; min-height:104px; justify-content:center; }
    .card.hl{ border-color:rgba(217,180,90,.45); background:linear-gradient(165deg,rgba(90,55,20,.28),rgba(40,22,60,.55)); }
    .card .k{ font-size:.68rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
    .card .prev{ font-size:.64rem; color:var(--muted); }
    .card .v{ font-family:-apple-system,sans-serif; font-size:1.55rem; font-weight:800; color:#fff; }
    .card .v.accent{ color:var(--gold-l); }
    .card .tax{ font-size:.64rem; color:var(--gold); }

    .chart-card{ background:linear-gradient(165deg,rgba(60,32,96,.34),rgba(24,13,42,.5)); border:1px solid var(--border); border-radius:16px; padding:16px 18px; }
    .chart-box{ position:relative; height:230px; } .chart-box.tall{ height:320px; }

    .twrap{ overflow-x:auto; border:1px solid var(--border); border-radius:14px; background:rgba(22,12,40,.5); }
    table{ width:100%; border-collapse:collapse; font-family:-apple-system,sans-serif; font-size:.82rem; white-space:nowrap; }
    th,td{ padding:11px 14px; text-align:right; }
    th{ font-size:.68rem; text-transform:uppercase; letter-spacing:.04em; color:var(--gold); background:rgba(217,180,90,.05); position:sticky; top:0; }
    th.sortable{ cursor:pointer; user-select:none; } th.sortable:hover{ color:var(--gold-l); }
    th:first-child,td:first-child{ text-align:left; max-width:280px; overflow:hidden; text-overflow:ellipsis; }
    tbody tr{ border-top:1px solid rgba(255,255,255,.04); } tbody tr:hover{ background:rgba(124,58,237,.08); }
    td .vlink{ color:var(--gold-l); text-decoration:none; } td .vlink:hover{ text-decoration:underline; }
    .w3filter{ width:100%; max-width:340px; margin:0 0 14px; padding:10px 14px; background:rgba(30,18,48,.7); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:-apple-system,sans-serif; font-size:.85rem; }
    .al,.st{ display:inline-block; font-family:-apple-system,sans-serif; font-size:.7rem; font-weight:700; padding:3px 9px; border-radius:7px; }
    .al-ok{ color:var(--green); background:rgba(34,197,94,.14); border:1px solid rgba(34,197,94,.4); }
    .al-alto{ color:var(--gold-l); background:rgba(217,180,90,.14); border:1px solid rgba(217,180,90,.4); }
    .al-crit{ color:var(--red); background:rgba(239,68,68,.16); border:1px solid rgba(239,68,68,.45); }
    .al-sem{ color:var(--muted); background:rgba(120,90,150,.16); border:1px solid rgba(150,95,190,.3); }
    .st-on{ color:var(--green); background:rgba(34,197,94,.14); border:1px solid rgba(34,197,94,.4); }
    .st-off{ color:var(--muted); background:rgba(120,90,150,.16); border:1px solid rgba(150,95,190,.3); }
    .st-bad{ color:var(--red); background:rgba(239,68,68,.16); border:1px solid rgba(239,68,68,.45); }
    .st-none{ color:var(--muted); }

    .lp-geral{ background:linear-gradient(135deg,var(--purple-d),#2a1250 60%,rgba(169,132,48,.5)); border:1px solid rgba(217,180,90,.4); border-radius:18px; padding:18px 26px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:22px; box-shadow:0 10px 40px rgba(60,20,110,.35); }
    .lp-geral-lbl{ font-size:.92rem; font-weight:800; letter-spacing:.06em; color:var(--gold-l); }
    .lp-geral-stats{ display:flex; gap:34px; flex-wrap:wrap; }
    .lp-meta-lbl{ font-size:.62rem; text-transform:uppercase; letter-spacing:.06em; color:rgba(255,255,255,.6); }
    .lp-meta-val{ font-family:-apple-system,sans-serif; font-size:1.35rem; font-weight:800; color:#fff; } .lp-meta-val.accent{ color:var(--gold-l); }
    .lp-panel{ background:linear-gradient(165deg,rgba(60,32,96,.34),rgba(22,12,40,.5)); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:22px; }
    .lp-header{ display:flex; align-items:flex-start; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:16px; }
    .lp-header-name{ font-size:1.05rem; font-weight:800; color:#fff; }
    .lp-header-url{ font-family:-apple-system,sans-serif; font-size:.72rem; color:var(--gold); text-decoration:none; } .lp-header-url:hover{ text-decoration:underline; }
    .lp-header-right{ display:flex; gap:26px; flex-wrap:wrap; }
    .lp-body{ display:grid; grid-template-columns:minmax(230px,1fr) 2fr; gap:22px; }
    .fn{ display:flex; flex-direction:column; gap:3px; }
    .fn-seg{ position:relative; height:52px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto; width:100%; }
    .fn-lbl{ font-family:-apple-system,sans-serif; font-size:.6rem; font-weight:700; letter-spacing:.04em; color:rgba(30,15,5,.82); }
    .fn-val{ font-family:-apple-system,sans-serif; font-size:1.05rem; font-weight:800; color:#1e0f05; }
    .fn-rate{ text-align:center; margin:1px 0; }
    .fn-pill{ font-family:-apple-system,sans-serif; font-size:.6rem; font-weight:700; color:var(--purple-l); background:rgba(124,58,237,.18); border:1px solid rgba(124,58,237,.4); padding:2px 9px; border-radius:20px; }
    .lp-charts-col{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; align-content:start; }
    .lp-chart-card{ background:rgba(30,18,48,.5); border:1px solid var(--border); border-radius:12px; padding:13px 15px; }
    .lp-chart-title{ font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:9px; }
    .lp-chart-h{ height:112px; }
    @media(max-width:820px){ .lp-body{ grid-template-columns:1fr; } }
    .empty,.loading{ text-align:center; color:var(--muted); padding:34px; }
    .err{ color:var(--red); }
    .foot{ margin-top:26px; font-size:.68rem; color:var(--muted); text-align:center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div class="brand">
        <span class="kicker">Hire International · Malu</span>
        <h1>Congresso <b>Trabalho Internacional</b></h1>
        <span class="sub">28 e 29 de novembro · São Paulo · Dashboard de tráfego</span>
      </div>
      <div class="top-r">
        <span class="live">AO VIVO</span>
        <div class="presets" id="presets">
          <button class="preset" data-d="0" onclick="setPreset(this)">Hoje</button>
          <button class="preset" data-d="7" onclick="setPreset(this)">7 dias</button>
          <button class="preset" data-d="14" onclick="setPreset(this)">14 dias</button>
          <button class="preset active" data-d="all" onclick="setPreset(this)">Tudo</button>
        </div>
        <div class="dates">
          <span class="dlbl">De</span><input type="date" id="dDe" onchange="setDates()">
          <span class="dlbl">até</span><input type="date" id="dAte" onchange="setDates()">
          <button class="dclear" id="dClear" onclick="clearDates()" style="display:none">✕</button>
        </div>
        <button class="btn" onclick="loadAll()">↻ Atualizar</button>
        <div class="updated" id="updated"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-p="geral" onclick="setTab(this)">Geral</button>
      <button class="tab" data-p="campanhas" onclick="setTab(this)">Campanhas</button>
      <button class="tab" data-p="publicos" onclick="setTab(this)">Públicos</button>
      <button class="tab" data-p="criativos" onclick="setTab(this)">Criativos</button>
      <button class="tab" data-p="lp" onclick="setTab(this)">Funil / LP</button>
    </div>

    <div id="body"><div class="loading">Carregando dados da planilha…</div></div>
    <div class="foot" id="foot">Atualiza automaticamente a cada abertura · Congresso Trabalho Internacional</div>
  </div>

  <script>
    // ── Config ───────────────────────────────────────────────────────────────
    const SHEET_CTI = '1Vp8wqrE7S7S4imDEmTanB4GL7Af7OEP_muqBLsbbz7o';
    const TAB_MALU  = '639532557';                // aba MALU (fonte única)
    const START = new Date(2026, 6, 21);          // 21/07/2026 — início do CTI
    const FLOOR = new Date(2026, 0, 1);
    const EVENT = new Date(2026, 10, 28);         // 28/11/2026 — evento (pace)
    const LP_URL = 'https://hire-international.com/pt/congresso-trabalho-internacional-malu-ads/';
    const METAS_DEFAULT = { investimento:30000, cpm:40, ctr:0.60, connect_rate:70, conversao:2, cpa:150, ingressos:200 };

    let DATA = { rows:[], metas:{...METAS_DEFAULT} };
    let view='geral', presetDays='all';

    const BRL = v => (v==null||isNaN(v)) ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    const BRLk= v => (v==null||isNaN(v)) ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
    const NUM = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
    const PCT = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
    const RS  = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) + 'x';
    const div = (a,b) => b ? a/b : 0;
    const dkey = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    function parseBR(s){ if(s==null) return 0; if(typeof s==='number') return s; s=String(s).replace(/R\$/g,'').replace(/%/g,'').replace(/ /g,'').trim(); if(!s) return 0; s=s.replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }

    let _seq=0;
    function gviz(sheetId, query){
      return new Promise((resolve,reject)=>{
        const cb='__gv_'+(++_seq)+'_'+Date.now();
        const s=document.createElement('script');
        const done=()=>{ try{delete window[cb];}catch(e){} if(s.parentNode)s.parentNode.removeChild(s); clearTimeout(tm); };
        const tm=setTimeout(()=>{done();reject(new Error('timeout'));},25000);
        window[cb]=r=>{ done(); (r&&r.table)?resolve(r.table):reject(new Error('vazio')); };
        s.onerror=()=>{done();reject(new Error('rede'));};
        s.src='https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?'+query+'&tqx=responseHandler:'+cb;
        document.head.appendChild(s);
      });
    }
    const cNum = c => !c ? 0 : (typeof c.v==='number' ? c.v : parseBR(c.f!=null?c.f:c.v));
    const cStr = c => !c ? '' : (c.f!=null?c.f:(c.v!=null?String(c.v):''));
    const cDate= c => { if(!c) return null;
      const f=String(c.f||c.v||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if(f){ let y=+f[3]; if(y<100)y+=2000; return new Date(y,+f[2]-1,+f[1]); }
      const d=String(c.v||'').match(/Date\((\d+),(\d+),(\d+)/); if(d) return new Date(+d[1],+d[2],+d[3]);
      return null; };

    // Colunas: Data(0) Campanha(1) Publico(2) Criativo(3) Investimento(4) Impressoes(5)
    // Cliques(6) Visitas(7) AddCarrinho(8) ValorCarrinho(9) Checkout(10) Vendas(11) Faturamento(12) Link(13) Status(14)
    function metaRows(table){
      const out=[];
      for(const r of (table.rows||[])){
        const c=r.c||[]; const d=cDate(c[0]); if(!d) continue;
        out.push({ date:d, campanha:cStr(c[1]), adset:cStr(c[2]), anuncio:cStr(c[3]),
          cost:cNum(c[4]), impressions:cNum(c[5]), clicks:cNum(c[6]), visits:cNum(c[7]), addcart:cNum(c[8]),
          checkout:cNum(c[10]), vendas:cNum(c[11]), faturamento:cNum(c[12]), link:cStr(c[13]), status:cStr(c[14]) });
      }
      return out;
    }
    function readMetas(table){
      const m={...METAS_DEFAULT};
      for(const r of (table.rows||[])){
        const c=r.c||[]; const lab=cStr(c[0]).toLowerCase().trim(); if(!lab) continue;
        const raw=c[1]; const v=raw?(typeof raw.v==='number'?raw.v:parseBR(raw.f!=null?raw.f:raw.v)):0;
        if(lab.indexOf('verba')>=0||lab.indexOf('trafego')>=0||lab.indexOf('tráfego')>=0){ if(v)m.investimento=v; }
        else if(lab==='cpm'){ if(v)m.cpm=v; }
        else if(lab==='ctr'){ if(v)m.ctr=v<1?v*100:v; }
        else if(lab.indexOf('connect')>=0){ if(v)m.connect_rate=v<=1?v*100:v; }
        else if(lab.indexOf('convers')>=0){ if(v)m.conversao=v<=1?v*100:v; }
        else if(lab.indexOf('custo por venda')>=0){ if(v)m.cpa=v; }
        else if(lab.indexOf('ingressos')>=0){ if(v>0)m.ingressos=v; }
      }
      return m;
    }

    // Status → selo. ACTIVE=ativo · *PAUSED=pausado · DISAPPROVED=reprovado.
    function stInfo(raw){ const s=String(raw||'').toUpperCase();
      if(s==='ACTIVE') return {t:'Ativo',c:'st-on',r:0};
      if(s==='DISAPPROVED') return {t:'Reprovado',c:'st-bad',r:2};
      if(s.indexOf('PAUSED')>=0) return {t:'Pausado',c:'st-off',r:1};
      return {t:'—',c:'st-none',r:3}; }
    const stBadge = raw => { const s=stInfo(raw); return `<span class="st ${s.c}">${s.t}</span>`; };
    function accStatus(o,r){ if(!r.status) return; const rk=stInfo(r.status).r;
      if(!o._sd||r.date>o._sd){ o._sd=r.date; o.status=r.status; o._rk=rk; }
      else if(o._sd&&+r.date===+o._sd&&rk<o._rk){ o.status=r.status; o._rk=rk; } }

    // ── Filtro de data ────────────────────────────────────────────────────────
    let fStart=null, fEnd=null;
    function cutoff(){ if(presetDays==='all') return FLOOR; const t=new Date(); t.setHours(0,0,0,0); const c=new Date(t); c.setDate(c.getDate()-Number(presetDays)); return c<FLOOR?FLOOR:c; }
    const inRange = d => { if(fStart&&d<fStart)return false; if(fEnd&&d>fEnd)return false; return d>=cutoff(); };

    // ── Agregação ─────────────────────────────────────────────────────────────
    function agg(rows){
      let cost=0,imp=0,clk=0,vis=0,cart=0,chk=0,vend=0,fat=0;
      for(const r of rows){ cost+=r.cost;imp+=r.impressions;clk+=r.clicks;vis+=r.visits;cart+=r.addcart;chk+=r.checkout;vend+=r.vendas;fat+=r.faturamento; }
      return { investido:cost, impressoes:imp, cliques:clk, visitas:vis, addcart:cart, checkout:chk, vendas:vend, faturamento:fat,
        ctr:div(clk,imp)*100, cpm:div(cost,imp)*1000, connect:div(vis,clk)*100, cpv:div(cost,vis), cpa:div(cost,vend),
        roas:div(fat,cost), ticket:div(fat,vend), txconv:div(vend,vis)*100 };
    }

    // ── Gauge / card ──────────────────────────────────────────────────────────
    const ARC=298.5;
    function gauge(id, title, atual, meta, fmt, stats, sub){
      const pct = meta? Math.min(100,Math.max(0,atual/meta*100)) : 0;
      const st = stats ? `<div class="gauge-stats">${stats.map(s=>`<div><div class="gauge-stat-l">${s[0]}</div><div class="gauge-stat-v ${s[2]||''}">${s[1]}</div></div>`).join('')}</div>` : '';
      return `<div class="gauge-card"><div class="gauge-title">${title}</div>${sub?`<div class="gauge-sub">${sub}</div>`:''}
        <div class="gauge-wrap"><svg class="gauge-svg" viewBox="-10 0 220 140">
          <path class="gauge-track" d="M5,110 A95,95,0,0,1,195,110"/>
          <path class="gauge-fill" d="M5,110 A95,95,0,0,1,195,110" stroke="url(#pg)" stroke-dasharray="${ARC} ${ARC}" stroke-dashoffset="${ARC*(1-pct/100)}"/>
          <defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#d9b45a"/></linearGradient></defs>
          <text x="0" y="132" class="gauge-leg" text-anchor="start" fill="rgba(255,255,255,.7)">${fmt(atual)}</text>
          <text x="200" y="132" class="gauge-leg" text-anchor="end" fill="rgba(255,255,255,.4)">${meta?fmt(meta):'—'}</text>
        </svg><div class="gauge-pct">${pct.toLocaleString('pt-BR',{maximumFractionDigits:1})}%</div></div>${st}</div>`;
    }
    function card(k,v,cls,prev,tax){ return `<div class="card ${cls&&cls.includes('hl')?'hl':''}"><div class="k">${k}</div>${prev?`<div class="prev">${prev}</div>`:''}<div class="v ${cls||''}">${v}</div>${tax?`<div class="tax">${tax}</div>`:''}</div>`; }
    let charts=[];
    function killCharts(){ charts.forEach(c=>{try{c.destroy();}catch(e){}}); charts=[]; }

    // ── Geral ─────────────────────────────────────────────────────────────────
    function render(){
      killCharts();
      const rows=DATA.rows.filter(r=>inRange(r.date));
      const k=agg(rows), m=DATA.metas;
      const daysD=new Set(rows.map(r=>dkey(r.date))).size||1;
      const today=new Date(); today.setHours(0,0,0,0);
      const diasRest=Math.max(1, Math.round((EVENT-today)/864e5));
      const faltaIng=Math.max(0, m.ingressos-k.vendas);
      const needIng=Math.ceil(faltaIng/diasRest);
      const ritmoIng=Math.round(k.vendas/daysD);
      const paceCls=ritmoIng>=needIng?'pc-ok':'pc-bad';

      let h='';
      h+=`<div class="gauges">`;
      h+=gauge('g1','Investimento', k.investido, m.investimento, BRLk,
        [['Média/dia', BRLk(k.investido/daysD)], ['Verba', BRLk(m.investimento)]], 'Verba prevista '+BRLk(m.investimento));
      h+=gauge('g2','Ingressos Vendidos', k.vendas, m.ingressos, NUM,
        [['Feito/dia', NUM(ritmoIng)], ['Precisa/dia', faltaIng>0?NUM(needIng):'✓', paceCls]], faltaIng>0?('Faltam '+NUM(faltaIng)+' · '+diasRest+' dias p/ 28/11'):'Meta batida');
      h+=gauge('g3','Taxa de Conversão', k.txconv, m.conversao, v=>PCT(v), null, 'Vendas ÷ Visitas · meta '+PCT(m.conversao));
      h+=`</div>`;

      h+=`<div class="lbl">Investimento & Alcance</div><div class="grid">`;
      h+=card('Investimento', BRL(k.investido), 'hl v', 'Verba: '+BRLk(m.investimento), 'Taxa investida '+PCT(div(k.investido,m.investimento)*100))
        +card('Impressões', NUM(k.impressoes))
        +card('Cliques', NUM(k.cliques))
        +card('CTR', PCT(k.ctr), '', '', 'Meta '+PCT(m.ctr))
        +card('CPM', BRL(k.cpm), '', '', 'Meta '+BRL(m.cpm));
      h+=`</div>`;

      h+=`<div class="lbl">Funil do Site</div><div class="grid">`;
      h+=card('Visitas no Site', NUM(k.visitas), 'accent')
        +card('Connect Rate', PCT(k.connect), '', '', 'Meta '+PCT(m.connect_rate))
        +card('Adições ao Carrinho', NUM(k.addcart))
        +card('Checkout', NUM(k.checkout))
        +card('Custo / Visita', BRL(k.cpv));
      h+=`</div>`;

      h+=`<div class="lbl">Resultado</div><div class="grid">`;
      h+=card('Ingressos (Vendas)', NUM(k.vendas), 'accent')
        +card('Faturamento', BRL(k.faturamento), 'hl v')
        +card('CPA', k.vendas?BRL(k.cpa):'—', '', '', 'Meta '+BRL(m.cpa))
        +card('ROAS', k.vendas?RS(k.roas):'—')
        +card('Ticket Médio', k.vendas?BRL(k.ticket):'—');
      h+=`</div>`;

      h+=`<div class="lbl">Investido & Vendas por Dia</div><div class="chart-card"><div class="chart-box tall"><canvas id="cDia"></canvas></div></div>`;
      document.getElementById('body').innerHTML=h;
      document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

      const invD={}, vendD={};
      for(const r of rows){ const kd=dkey(r.date); invD[kd]=(invD[kd]||0)+r.cost; vendD[kd]=(vendD[kd]||0)+r.vendas; }
      const dts=[...new Set([...Object.keys(invD),...Object.keys(vendD)])].sort();
      const lbls=dts.map(k=>{const p=k.split('-');return p[2]+'/'+p[1];});
      charts.push(new Chart(document.getElementById('cDia'),{ data:{labels:lbls, datasets:[
        {type:'bar', label:'Vendas', data:dts.map(k=>vendD[k]||0), backgroundColor:'#d9b45acc', borderColor:'#f2d98a', borderRadius:4, yAxisID:'y'},
        {type:'line', label:'Investido/dia', data:dts.map(k=>+(invD[k]||0).toFixed(2)), borderColor:'#a855f7', backgroundColor:'rgba(168,85,247,.12)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#a855f7', tension:.35, yAxisID:'y1'} ]},
        options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
          plugins:{ legend:{labels:{color:'#cbb8dd',boxWidth:14,font:{size:12}}}, tooltip:{callbacks:{label:c=>c.dataset.label.indexOf('Investido')>=0?' Investido: '+BRL(c.parsed.y):' '+c.dataset.label+': '+c.parsed.y}} },
          scales:{ x:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:11}}}, y:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0'},beginAtZero:true},
            y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#d9b45a',callback:v=>'R$'+Math.round(v)},beginAtZero:true} } } }));
    }

    // ── Router ────────────────────────────────────────────────────────────────
    function route(){ if(view==='campanhas')return renderTabela('campanhas'); if(view==='publicos')return renderTabela('publicos'); if(view==='criativos')return renderTabela('criativos'); if(view==='lp')return renderLP(); render(); }
    function setTab(el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); view=el.dataset.p; route(); }
    function setPreset(el){ document.querySelectorAll('.preset').forEach(t=>t.classList.remove('active')); el.classList.add('active'); presetDays=el.dataset.d; fStart=fEnd=null; document.getElementById('dDe').value=''; document.getElementById('dAte').value=''; document.getElementById('dClear').style.display='none'; route(); }
    const _pDate = v => { if(!v) return null; const p=v.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); };
    function setDates(){ fStart=_pDate(document.getElementById('dDe').value); fEnd=_pDate(document.getElementById('dAte').value);
      if(fStart&&fEnd&&fStart>fEnd){ const t=fStart; fStart=fEnd; fEnd=t; document.getElementById('dDe').value=dkey(fStart); document.getElementById('dAte').value=dkey(fEnd); }
      if(fStart||fEnd){ presetDays='all'; document.querySelectorAll('.preset').forEach(t=>t.classList.remove('active')); document.getElementById('dClear').style.display=''; }
      else { document.querySelector('.preset[data-d="all"]').classList.add('active'); document.getElementById('dClear').style.display='none'; } route(); }
    function clearDates(){ fStart=fEnd=null; presetDays='all'; document.getElementById('dDe').value=''; document.getElementById('dAte').value=''; document.getElementById('dClear').style.display='none'; document.querySelectorAll('.preset').forEach(t=>t.classList.remove('active')); document.querySelector('.preset[data-d="all"]').classList.add('active'); route(); }

    // ── Ordenação ───────────────────────────────────────────────────────────────
    let _sortState={};
    function doSort(tab,key){ const st=_sortState[tab]||(_sortState[tab]={key:key,dir:-1}); if(st.key===key) st.dir=-st.dir; else { st.key=key; st.dir=-1; } route(); }
    function sortRows(tab, rows, defKey){ const st=_sortState[tab]||(_sortState[tab]={key:defKey,dir:-1});
      return rows.slice().sort((a,b)=>{ let va=a[st.key], vb=b[st.key]; if(va==null||va==='')va=-Infinity; if(vb==null||vb==='')vb=-Infinity;
        if(typeof va==='number'&&typeof vb==='number') return (va-vb)*st.dir; return String(va).localeCompare(String(vb),'pt')*st.dir; }); }
    function sortTh(tab,key,label,left){ const st=_sortState[tab]||{}; const ar=st.key===key?(st.dir<0?' ↓':' ↑'):''; return `<th class="sortable" onclick="doSort('${tab}','${key}')"${left?' style="text-align:left"':''}>${label}${ar}</th>`; }

    // ── Tabelas ───────────────────────────────────────────────────────────────
    function agrupa(rows, keyFn, withLink){
      const by={}, metaCPA=DATA.metas.cpa;
      for(const r of rows){ const key=keyFn(r)||'—'; let o=by[key];
        if(!o) o=by[key]={nome:key,link:'',status:'',_sd:null,_rk:9,cost:0,imp:0,clk:0,vis:0,chk:0,vend:0,fat:0};
        o.cost+=r.cost;o.imp+=r.impressions;o.clk+=r.clicks;o.vis+=r.visits;o.chk+=r.checkout;o.vend+=r.vendas;o.fat+=r.faturamento;
        if(withLink&&r.link&&!o.link)o.link=r.link; accStatus(o,r);
      }
      return Object.values(by).map(o=>{ const cpa=div(o.cost,o.vend);
        let al='ok'; if(!o.vend) al='sem'; else if(cpa>metaCPA*1.5) al='critico'; else if(cpa>metaCPA) al='alto';
        return { nome:o.nome, link:o.link, status:o.status, investido:o.cost, imp:o.imp, ctr:div(o.clk,o.imp)*100,
          cliques:o.clk, visitas:o.vis, cr:div(o.vis,o.clk)*100, checkout:o.chk, vendas:o.vend, cpa, roas:div(o.fat,o.cost), faturamento:o.fat, al };
      }).sort((a,b)=>b.investido-a.investido);
    }
    const TAB_CFG = {
      campanhas:{ key:r=>r.campanha, label:'Campanha', title:'Performance por Campanha', link:false, row:'crow' },
      publicos: { key:r=>r.adset,    label:'Público',  title:'Performance por Público (Ad Set)', link:false, row:'purow' },
      criativos:{ key:r=>r.anuncio,  label:'Anúncio',  title:'Performance por Criativo', link:true, row:'crrow' },
    };
    let _fq={campanhas:'',publicos:'',criativos:''};
    function renderTabela(tab){
      killCharts();
      const cfg=TAB_CFG[tab];
      const list=sortRows(tab, agrupa(DATA.rows.filter(r=>inRange(r.date)), cfg.key, cfg.link), 'investido');
      const AL={ok:['OK','al-ok'],alto:['CPA Alto','al-alto'],critico:['CPA Crítico','al-crit'],sem:['Sem Venda','al-sem']};
      let h=`<div class="lbl">${cfg.title} (${list.length}) · meta CPA ${BRL(DATA.metas.cpa)}</div>
        <input class="w3filter" value="${(_fq[tab]||'').replace(/"/g,'&quot;')}" placeholder="Filtrar por nome…" oninput="_fq['${tab}']=this.value.toLowerCase();document.querySelectorAll('.${cfg.row}').forEach(function(tr){tr.style.display=tr.dataset.n.indexOf(_fq['${tab}'])>=0?'':'none';});">
        <div class="twrap"><table><thead><tr>
        ${sortTh(tab,'nome',cfg.label,1)}${sortTh(tab,'status','Status')}${sortTh(tab,'investido','Investido')}${sortTh(tab,'imp','Impr.')}${sortTh(tab,'cliques','Cliques')}${sortTh(tab,'visitas','Visitas')}${sortTh(tab,'vendas','Vendas')}${sortTh(tab,'cpa','CPA')}${sortTh(tab,'roas','ROAS')}${cfg.link?'<th>Link</th>':''}
      </tr></thead><tbody>`;
      const cols=cfg.link?10:9;
      if(!list.length) h+=`<tr><td colspan="${cols}" class="empty">Sem dados no período</td></tr>`;
      else for(const o of list){
        h+=`<tr class="${cfg.row}" data-n="${(o.nome||'').toLowerCase()}"><td title="${o.nome}">${o.nome}</td><td>${stBadge(o.status)}</td><td>${BRL(o.investido)}</td><td>${NUM(o.imp)}</td><td>${NUM(o.cliques)}</td><td>${NUM(o.visitas)}</td><td>${NUM(o.vendas)}</td><td>${o.vendas?BRL(o.cpa):'—'}</td><td>${o.vendas?RS(o.roas):'—'}</td>${cfg.link?`<td>${o.link?`<a class="vlink" href="${o.link}" target="_blank">🔗 ver</a>`:'—'}</td>`:''}</tr>`;
      }
      h+=`</tbody></table></div>`;
      document.getElementById('body').innerHTML=h;
      document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }

    // ── Funil / LP ────────────────────────────────────────────────────────────
    function lpDaily(rows){
      const map={};
      for(const r of rows){ const k=dkey(r.date); const o=map[k]||(map[k]={imp:0,clk:0,vis:0,vend:0,inv:0}); o.imp+=r.impressions;o.clk+=r.clicks;o.vis+=r.visits;o.vend+=r.vendas;o.inv+=r.cost; }
      const keys=Object.keys(map).sort();
      return { labels:keys.map(k=>{const p=k.split('-');return p[2]+'/'+p[1];}),
        ctr:keys.map(k=>{const o=map[k];return o.imp?+(o.clk/o.imp*100).toFixed(2):null;}),
        connect:keys.map(k=>{const o=map[k];return o.clk?+(o.vis/o.clk*100).toFixed(2):null;}),
        visitas:keys.map(k=>map[k].vis) }; }
    function lpLine(cid, labels, data, color, pct){
      const el=document.getElementById(cid); if(!el) return;
      charts.push(new Chart(el,{ type:'line', data:{ labels, datasets:[{ data, borderColor:color, backgroundColor:color+'22', borderWidth:2, pointRadius:2, pointBackgroundColor:color, tension:.3, spanGaps:true, fill:true }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+(pct?c.parsed.y+'%':c.parsed.y)}}},
          scales:{ x:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:9},maxTicksLimit:8}}, y:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:9},callback:v=>pct?v+'%':v},beginAtZero:true} } } })); }
    function renderLP(){
      killCharts();
      const rows=DATA.rows.filter(r=>inRange(r.date));
      if(!rows.length){ document.getElementById('body').innerHTML='<div class="empty">Sem dados no período</div>'; return; }
      const a=agg(rows), d=lpDaily(rows);
      let h=`<div class="lp-geral"><div class="lp-geral-lbl">CONGRESSO · MALU</div><div class="lp-geral-stats">
        <div><div class="lp-meta-lbl">Total Gasto</div><div class="lp-meta-val">${BRL(a.investido)}</div></div>
        <div><div class="lp-meta-lbl">Vendas</div><div class="lp-meta-val accent">${NUM(a.vendas)}</div></div>
        <div><div class="lp-meta-lbl">Faturamento</div><div class="lp-meta-val">${BRL(a.faturamento)}</div></div>
        <div><div class="lp-meta-lbl">ROAS</div><div class="lp-meta-val accent">${a.vendas?RS(a.roas):'—'}</div></div>
      </div></div>`;
      const steps=[
        {n:'IMPRESSÕES', v:a.impressoes, rate:'CTR '+PCT(a.ctr)},
        {n:'CLIQUES', v:a.cliques, rate:'CONNECT '+PCT(a.connect)},
        {n:'VISITAS NO SITE', v:a.visitas, rate:'CARRINHO '+PCT(div(a.addcart,a.visitas)*100)},
        {n:'ADIÇÕES AO CARRINHO', v:a.addcart, rate:'CHECKOUT '+PCT(div(a.checkout,a.addcart)*100)},
        {n:'CHECKOUT', v:a.checkout, rate:'VENDA '+PCT(div(a.vendas,a.checkout)*100)},
        {n:'VENDAS', v:a.vendas, rate:''},
      ];
      const wts=[100,82,64,48,34,24];
      let fn='<div class="fn">';
      for(let si=0;si<steps.length;si++){ const s=steps[si]; const wt=wts[si], wb=wts[si+1]!=null?wts[si+1]:wts[si]-8;
        const tl=(100-wt)/2,tr=(100+wt)/2,br=(100+wb)/2,bl=(100-wb)/2; const L=52-si*4;
        fn+=`<div class="fn-seg" style="clip-path:polygon(${tl}% 0,${tr}% 0,${br}% 100%,${bl}% 100%);background:linear-gradient(180deg,hsla(42,58%,${L}%,.95),hsla(42,58%,${L-6}%,.9))"><div class="fn-lbl">${s.n}</div><div class="fn-val">${NUM(s.v)}</div></div>`;
        if(s.rate) fn+=`<div class="fn-rate"><span class="fn-pill">${s.rate}</span></div>`;
      }
      fn+='</div>';
      h+=`<div class="lp-panel"><div class="lp-header"><div><div class="lp-header-name">LP Malu · Congresso</div><a class="lp-header-url" href="${LP_URL}" target="_blank">${LP_URL.replace('https://','')}</a></div>
        <div class="lp-header-right">
          <div><div class="lp-meta-lbl">CPA</div><div class="lp-meta-val">${a.vendas?BRL(a.cpa):'—'}</div></div>
          <div><div class="lp-meta-lbl">Ticket</div><div class="lp-meta-val">${a.vendas?BRL(a.ticket):'—'}</div></div>
          <div><div class="lp-meta-lbl">Connect</div><div class="lp-meta-val accent">${PCT(a.connect)}</div></div>
        </div></div>
        <div class="lp-body"><div class="lp-funnel-col">${fn}</div><div class="lp-charts-col">
          <div class="lp-chart-card"><div class="lp-chart-title">CTR (Impr→Clique)</div><div class="lp-chart-h"><canvas id="lpA"></canvas></div></div>
          <div class="lp-chart-card"><div class="lp-chart-title">Connect (Clique→Visita)</div><div class="lp-chart-h"><canvas id="lpB"></canvas></div></div>
          <div class="lp-chart-card"><div class="lp-chart-title">Visitas por dia</div><div class="lp-chart-h"><canvas id="lpC"></canvas></div></div>
        </div></div></div>`;
      document.getElementById('body').innerHTML=h;
      lpLine('lpA',d.labels,d.ctr,'#a855f7',true); lpLine('lpB',d.labels,d.connect,'#d9b45a',true); lpLine('lpC',d.labels,d.visitas,'#7fe0a8',false);
      document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }

    // ── Load ──────────────────────────────────────────────────────────────────
    async function loadAll(){
      document.getElementById('body').innerHTML='<div class="loading">Carregando dados da planilha…</div>';
      try{
        const [tMalu,tMetas]=await Promise.all([
          gviz(SHEET_CTI,'gid='+TAB_MALU),
          gviz(SHEET_CTI,'sheet='+encodeURIComponent('Metas')).catch(()=>null),
        ]);
        DATA.rows=metaRows(tMalu);
        DATA.metas=tMetas?readMetas(tMetas):{...METAS_DEFAULT};
        route();
      }catch(e){ document.getElementById('body').innerHTML='<div class="empty err">Erro ao carregar: '+e.message+'</div>'; }
    }
    loadAll();
  </script>
</body>
</html>
